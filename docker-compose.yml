services:
  backend:
    image: ghcr.io/franion03/aqua-os-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JWT_KEY=${JWT_KEY:-change-me}
      - DB_DRIVER=sqlite
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  crew:
    image: ghcr.io/franion03/aqua-os-crew:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - JWT_KEY=${JWT_KEY:-change-me}
    depends_on:
      backend:
        condition: service_healthy

  web:
    image: ghcr.io/franion03/aqua-os-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  calendar:
    image: ghcr.io/franion03/aqua-os-calendar:latest
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=aquaos_calendar;Username=aquaos;Password=${DB_PASSWORD:-devpassword}
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aquaos_calendar
      - POSTGRES_USER=aquaos
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaos"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=aquaos
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-devpassword}

volumes:
  backend-data:
  postgres-data:
