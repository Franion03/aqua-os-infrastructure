{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aqua-os.fullname" . }}
  labels:
    {{- include "aqua-os.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "aqua-os.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/calendar
            pathType: Prefix
            backend:
              service:
                name: {{ include "aqua-os.fullname" . }}-calendar
                port:
                  number: {{ .Values.calendar.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "aqua-os.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /crew
            pathType: Prefix
            backend:
              service:
                name: {{ include "aqua-os.fullname" . }}-crew
                port:
                  number: {{ .Values.crew.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aqua-os.fullname" . }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
