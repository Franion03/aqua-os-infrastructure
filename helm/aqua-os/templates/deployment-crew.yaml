apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aqua-os.fullname" . }}-crew
  labels:
    {{- include "aqua-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: crew
spec:
  replicas: {{ .Values.crew.replicaCount }}
  selector:
    matchLabels:
      {{- include "aqua-os.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: crew
  template:
    metadata:
      labels:
        {{- include "aqua-os.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: crew
    spec:
      containers:
        - name: crew
          image: "{{ .Values.crew.image.repository }}:{{ .Values.crew.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.crew.service.port }}
          env:
            {{- range $key, $value := .Values.crew.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.crew.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.crew.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.crew.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
